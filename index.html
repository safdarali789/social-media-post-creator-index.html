<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Creator Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            min-height: 100vh; 
            color: #e2e8f0; 
        }
        .header { 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(10px);
            padding: 12px 20px; 
            border-bottom: 1px solid rgba(148, 163, 184, 0.1); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 200;
            gap: 16px;
        }
        .logo { 
            font-size: 18px; 
            font-weight: 800; 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        .header-controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .header-btn {
            background: rgba(148, 163, 184, 0.1);
            border: 1px solid rgba(148, 163, 184, 0.25);
            color: #cbd5e1;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .header-btn:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            color: #3b82f6;
        }
        .user-info {
            font-size: 10px;
            color: #94a3b8;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .export-btn { 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
            color: white; 
            padding: 8px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 10px;
        }
        .export-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); 
        }
        .main { 
            display: grid; 
            grid-template-columns: 270px 1fr 280px; 
            gap: 0; 
            height: calc(100vh - 50px); 
        }
        @media (max-width: 1200px) { 
            .main { grid-template-columns: 230px 1fr; } 
            .right-panel { display: none; } 
        }
        @media (max-width: 768px) { 
            .main { grid-template-columns: 1fr; } 
            .left-panel { display: none; } 
        }
        .panel { 
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(148, 163, 184, 0.1); 
            overflow-y: auto; 
            padding: 12px; 
        }
        .right-panel { 
            border-left: 1px solid rgba(148, 163, 184, 0.1); 
        }
        .canvas-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: linear-gradient(45deg, rgba(15, 23, 42, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%); 
            overflow: auto; 
            padding: 15px;
        }
        canvas { 
            cursor: grab;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6); 
            border-radius: 12px;
            background: white;
        }
        canvas:active { cursor: grabbing; }
        .section-title { 
            font-size: 10px; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: 1.2px; 
            color: #94a3b8; 
            margin: 12px 0 8px; 
            padding-bottom: 6px; 
            border-bottom: 2px solid rgba(59, 130, 246, 0.2);
        }
        .section-title:first-child { margin-top: 0; }
        .grid-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 6px; 
            margin-bottom: 10px; 
        }
        .grid-3 { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 4px; 
        }
        .btn { 
            padding: 6px 8px; 
            background: rgba(148, 163, 184, 0.08); 
            border: 1px solid rgba(148, 163, 184, 0.25); 
            color: #cbd5e1; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 9px; 
            font-weight: 600; 
            text-align: center; 
            transition: all 0.3s;
        }
        .btn:hover { 
            background: rgba(59, 130, 246, 0.15); 
            border-color: #3b82f6; 
            color: #3b82f6;
        }
        .btn.active { 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
            border-color: transparent; 
            color: white;
        }
        .btn-large {
            padding: 8px;
            font-size: 10px;
            width: 100%;
            margin-bottom: 6px;
        }
        .control-group { 
            margin-bottom: 10px; 
        }
        .label { 
            display: block; 
            font-size: 10px; 
            font-weight: 700; 
            color: #cbd5e1; 
            margin-bottom: 4px;
        }
        input, textarea, select { 
            width: 100%; 
            padding: 6px 8px; 
            background: rgba(148, 163, 184, 0.08); 
            border: 1px solid rgba(148, 163, 184, 0.25); 
            border-radius: 6px; 
            color: #e2e8f0; 
            font-size: 10px; 
            font-family: inherit; 
            transition: all 0.3s;
        }
        input:focus, textarea:focus, select:focus { 
            background: rgba(59, 130, 246, 0.15); 
            border-color: #3b82f6; 
            outline: none;
        }
        textarea { 
            resize: vertical; 
            min-height: 45px;
        }
        input[type="color"] { 
            cursor: pointer; 
            padding: 3px; 
            height: 32px;
        }
        .slider-group { 
            display: grid; 
            grid-template-columns: 1fr 40px; 
            gap: 8px; 
        }
        input[type="range"] { 
            width: 100%; 
            height: 4px; 
            background: rgba(148, 163, 184, 0.2); 
            border-radius: 2px; 
            outline: none; 
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; 
            width: 14px; 
            height: 14px; 
            border-radius: 50%; 
            background: #3b82f6; 
            cursor: pointer;
        }
        .value-display { 
            font-size: 9px; 
            color: #94a3b8; 
            font-weight: 700;
            text-align: right;
        }
        .tabs { 
            display: flex; 
            gap: 0; 
            border-bottom: 1px solid rgba(148, 163, 184, 0.15); 
            margin-bottom: 10px;
        }
        .tab { 
            flex: 1; 
            padding: 8px 0; 
            border: none; 
            background: none; 
            color: #94a3b8; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 9px; 
            border-bottom: 2px solid transparent; 
            transition: all 0.3s;
        }
        .tab.active { 
            color: #3b82f6; 
            border-bottom-color: #3b82f6;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            padding: 24px;
            max-width: 420px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            font-size: 18px;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 24px;
            cursor: pointer;
        }
        .layer-item {
            padding: 8px;
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.1);
            border-radius: 6px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 10px;
            color: #cbd5e1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .layer-item:hover {
            background: rgba(59, 130, 246, 0.15);
        }
        .layer-item.active {
            background: rgba(59, 130, 246, 0.25);
            color: #3b82f6;
        }
        .status { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-size: 11px; 
            font-weight: 600; 
            opacity: 0; 
            transition: opacity 0.3s; 
            pointer-events: none;
        }
        .status.show { opacity: 1; }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            background: rgba(148, 163, 184, 0.08);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 6px;
            color: #e2e8f0;
            font-size: 12px;
        }
        .form-group input:focus {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            outline: none;
        }
        .form-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }
        .form-btn:hover {
            transform: translateY(-2px);
        }
        .form-link {
            text-align: center;
            margin-top: 12px;
            font-size: 11px;
            color: #94a3b8;
        }
        .form-link button {
            background: none;
            border: none;
            color: #3b82f6;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }
        .form-link button:hover {
            color: #8b5cf6;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(59, 130, 246, 0.4); 
            border-radius: 3px; 
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <div class="header">
        <div class="logo">🎨 Pro Creator Studio</div>
        <div class="header-controls">
            <button class="header-btn" id="undoBtn" onclick="undo()">↶ Undo</button>
            <button class="header-btn" id="redoBtn" onclick="redo()">↷ Redo</button>
            <button class="header-btn" onclick="openGallery()">📁 Gallery</button>
            <button class="header-btn" onclick="openImportModal()">📥 Import</button>
            <span id="platformLabel" style="font-size: 11px; color: #94a3b8;">Instagram • 1080×1080</span>
        </div>
        <div class="user-info">
            <span id="userDisplay">Guest</span>
            <button class="header-btn" id="authBtn" onclick="openAuth()">Login</button>
        </div>
        <button class="export-btn" onclick="exportDesign()">⬇️ Export</button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">
        <!-- LEFT SIDEBAR -->
        <div class="panel left-panel">
            <div class="tabs">
                <button class="tab active" onclick="switchTab(event, 'templates')">Templates</button>
                <button class="tab" onclick="switchTab(event, 'elements')">Add</button>
                <button class="tab" onclick="switchTab(event, 'layers')">Layers</button>
            </div>

            <!-- TEMPLATES TAB -->
            <div id="templates" class="tab-content active">
                <div class="section-title">Platform</div>
                <div class="grid-2">
                    <button class="btn active" onclick="setPlatform(1080, 1080, 'Instagram')">📸 Insta</button>
                    <button class="btn" onclick="setPlatform(1080, 1350, 'Story')">📱 Story</button>
                    <button class="btn" onclick="setPlatform(1200, 628, 'Facebook')">👍 FB</button>
                    <button class="btn" onclick="setPlatform(1024, 512, 'Twitter')">𝕏 Twitter</button>
                    <button class="btn" onclick="setPlatform(1200, 1500, 'Pinterest')">📌 Pin</button>
                    <button class="btn" onclick="setPlatform(1280, 720, 'YouTube')">▶️ YT</button>
                    <button class="btn" onclick="setPlatform(1080, 1920, 'TikTok')">🎵 TikTok</button>
                    <button class="btn" onclick="setPlatform(800, 600, 'Custom')">⚙️ Custom</button>
                </div>

                <div class="section-title">Colors</div>
                <div class="grid-3" id="colorPalette"></div>

                <div class="section-title">Background</div>
                <div class="control-group">
                    <label class="label">Color</label>
                    <input type="color" id="bgColor" value="#ffffff" onchange="updateCanvas()">
                </div>
                <div class="control-group">
                    <label class="label">Image</label>
                    <input type="file" id="bgImage" accept="image/*" onchange="loadBgImage()">
                </div>
            </div>

            <!-- ELEMENTS TAB -->
            <div id="elements" class="tab-content">
                <button class="btn btn-large" onclick="addTextBox()">+ Text</button>
                <button class="btn btn-large" onclick="add3DText()">+ 3D Text</button>
                <button class="btn btn-large" onclick="openImageImport()">+ Image</button>

                <div class="section-title" style="margin-top: 12px;">Text (Selected)</div>
                <div id="textControls" style="display: none;">
                    <div class="control-group">
                        <textarea id="textContent" onchange="updateSelectedElement()" oninput="updateSelectedElement()">Text here</textarea>
                    </div>
                    <div class="control-group">
                        <label class="label">Size</label>
                        <div class="slider-group">
                            <input type="range" id="textSize" min="10" max="120" value="32" onchange="updateSelectedElement()">
                            <div class="value-display" id="textSizeVal">32px</div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label class="label">Font</label>
                        <select id="textFont" onchange="updateSelectedElement()">
                            <option value="Arial">Arial</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Impact" selected>Impact</option>
                            <option value="Courier">Courier</option>
                            <option value="Verdana">Verdana</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label class="label">Color</label>
                        <input type="color" id="textColor" value="#000000" onchange="updateSelectedElement()">
                    </div>
                    <div class="grid-2">
                        <button class="btn" onclick="cloneElement()">Clone</button>
                        <button class="btn" style="background: rgba(239, 68, 68, 0.15); color: #fca5a5;" onclick="deleteElement()">Delete</button>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 12px;">3D Text (Selected)</div>
                <div id="text3DControls" style="display: none;">
                    <div class="control-group">
                        <textarea id="text3DContent" onchange="updateSelectedElement()" oninput="updateSelectedElement()">3D Text</textarea>
                    </div>
                    <div class="control-group">
                        <label class="label">Depth</label>
                        <div class="slider-group">
                            <input type="range" id="text3DDepth" min="0" max="30" value="10" onchange="updateSelectedElement()">
                            <div class="value-display" id="text3DDepthVal">10</div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label class="label">Size</label>
                        <div class="slider-group">
                            <input type="range" id="text3DSize" min="20" max="100" value="48" onchange="updateSelectedElement()">
                            <div class="value-display" id="text3DSizeVal">48px</div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label class="label">Color</label>
                        <input type="color" id="text3DColor" value="#3b82f6" onchange="updateSelectedElement()">
                    </div>
                    <div class="grid-2">
                        <button class="btn" onclick="cloneElement()">Clone</button>
                        <button class="btn" style="background: rgba(239, 68, 68, 0.15); color: #fca5a5;" onclick="deleteElement()">Delete</button>
                    </div>
                </div>

                <div class="section-title" style="margin-top: 12px;">Shapes</div>
                <div class="grid-3">
                    <button class="btn" onclick="addShape('rect')">⬜</button>
                    <button class="btn" onclick="addShape('circle')">⭕</button>
                    <button class="btn" onclick="addShape('triangle')">🔺</button>
                </div>
                <div class="control-group" style="margin-top: 8px;">
                    <input type="color" id="shapeColor" value="#3b82f6" onchange="updateCanvas()">
                </div>
            </div>

            <!-- LAYERS TAB -->
            <div id="layers" class="tab-content">
                <div class="section-title">Elements</div>
                <div id="layersList" style="max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>

        <!-- CANVAS -->
        <div class="canvas-wrapper">
            <canvas id="canvas" width="1080" height="1080"></canvas>
        </div>

        <!-- RIGHT SIDEBAR -->
        <div class="panel right-panel">
            <div class="section-title">Filters</div>
            <div class="grid-3">
                <button class="btn" onclick="applyFilter('bright')">Bright</button>
                <button class="btn" onclick="applyFilter('contrast')">Contrast</button>
                <button class="btn" onclick="applyFilter('sepia')">Sepia</button>
            </div>

            <div class="control-group" style="margin-top: 10px;">
                <label class="label">Brightness</label>
                <div class="slider-group">
                    <input type="range" id="brightness" min="50" max="200" value="100" onchange="updateCanvas()">
                    <div class="value-display" id="brightnessVal">100%</div>
                </div>
            </div>

            <div class="control-group">
                <label class="label">Contrast</label>
                <div class="slider-group">
                    <input type="range" id="contrast" min="50" max="200" value="100" onchange="updateCanvas()">
                    <div class="value-display" id="contrastVal">100%</div>
                </div>
            </div>

            <div class="control-group">
                <label class="label">Saturation</label>
                <div class="slider-group">
                    <input type="range" id="saturation" min="0" max="200" value="100" onchange="updateCanvas()">
                    <div class="value-display" id="saturationVal">100%</div>
                </div>
            </div>

            <div class="control-group">
                <label class="label">Blur</label>
                <div class="slider-group">
                    <input type="range" id="blur" min="0" max="20" value="0" onchange="updateCanvas()">
                    <div class="value-display" id="blurVal">0px</div>
                </div>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('authModal')">✕</button>
            
            <div id="loginForm">
                <div class="modal-header">🔐 Login / Signup</div>
                <div class="form-group">
                    <input type="email" id="authEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="authPassword" placeholder="Password" required>
                </div>
                <button class="form-btn" onclick="login()">Login / Signup</button>
                <div class="form-link">
                    <p style="color: #94a3b8; font-size: 10px; line-height: 1.6;">
                        ✨ پہلی design فری ہے<br>
                        دوسری بنانے پر login کریں<br>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- IMPORT MODAL -->
    <div class="modal" id="importModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('importModal')">✕</button>
            <div class="modal-header">📥 Import Image</div>
            
            <div class="control-group">
                <label class="label">Image URL</label>
                <input type="text" id="imageUrl" placeholder="https://example.com/image.jpg">
            </div>
            <button class="btn btn-large" onclick="importImageFromUrl()">Import from URL</button>

            <div style="text-align: center; color: #94a3b8; margin: 12px 0; font-size: 10px;">OR</div>

            <div class="control-group">
                <label class="label">Upload from Device</label>
                <input type="file" id="importFile" accept="image/*" onchange="importImageFromFile()">
            </div>
        </div>
    </div>

    <!-- GALLERY MODAL -->
    <div class="modal" id="galleryModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('galleryModal')">✕</button>
            <div class="modal-header">📁 Saved Designs</div>
            <div id="galleryGrid" style="display: grid; grid-template-columns: 1fr; gap: 8px;"></div>
        </div>
    </div>

    <!-- STATUS -->
    <div class="status" id="statusBar">Action completed ✨</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let elements = [];
        let selectedId = null;
        let isDragging = false;
        let dragElement = null;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let history = [];
        let historyIndex = -1;
        let backgroundImage = null;
        let currentUser = null;
        let hasCreatedFreeDesign = false;

        const colors = [
            '#1e88e5', '#7e57c2', '#ec407a', '#00acc1', '#43a047',
            '#fb8c00', '#e53935', '#00796b', '#3949ab', '#f57f17'
        ];

        // Check user status
        function checkUserStatus() {
            currentUser = localStorage.getItem('currentUser');
            hasCreatedFreeDesign = localStorage.getItem('freeDesignCreated') === 'true';

            if (currentUser) {
                document.getElementById('userDisplay').textContent = currentUser.split('@')[0];
                document.getElementById('authBtn').textContent = 'Logout';
            } else {
                document.getElementById('userDisplay').textContent = 'Guest';
                document.getElementById('authBtn').textContent = 'Login';
            }
        }

        function openAuth() {
            if (currentUser) {
                logout();
            } else {
                document.getElementById('authModal').classList.add('show');
            }
        }

        function login() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (!email || !password) {
                showStatus('Email اور password ضروری ہیں');
                return;
            }

            localStorage.setItem('currentUser', email);
            currentUser = email;
            checkUserStatus();
            closeModal('authModal');
            showStatus('Login کامیاب! ✅');
            document.getElementById('authEmail').value = '';
            document.getElementById('authPassword').value = '';
        }

        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            checkUserStatus();
            showStatus('Logout کامیاب');
        }

        // Classes
        class TextBox {
            constructor() {
                this.id = Date.now();
                this.text = 'Click to edit';
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.fontSize = 32;
                this.color = '#000000';
                this.font = 'Arial';
                this.alignment = 'center';
                this.width = 400;
                this.height = 80;
                this.type = 'text';
            }
        }

        class Text3D {
            constructor() {
                this.id = Date.now() + Math.random();
                this.text = '3D Text';
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.fontSize = 48;
                this.color = '#3b82f6;
                this.depth = 10;
                this.width = 400;
                this.height = 100;
                this.type = '3d-text';
            }
        }

        class Shape {
            constructor(type) {
                this.id = Date.now() + Math.random();
                this.type = type;
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.width = 100;
                this.height = 100;
                this.color = document.getElementById('shapeColor').value;
                this.opacity = 0.8;
            }
        }

        class ImageElement {
            constructor(src) {
                this.id = Date.now() + Math.random();
                this.type = 'image';
                this.src = src;
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.width = 150;
                this.height = 150;
                this.img = null;
                this.opacity = 1;
            }
        }

        // UNDO/REDO
        function saveHistory() {
            history = history.slice(0, historyIndex + 1);
            history.push(JSON.stringify(elements));
            historyIndex++;
            updateHistoryButtons();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                elements = JSON.parse(history[historyIndex]);
                updateCanvas();
                updateLayersList();
                showStatus('Undo ↶');
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                elements = JSON.parse(history[historyIndex]);
                updateCanvas();
                updateLayersList();
                showStatus('Redo ↷');
            }
        }

        function updateHistoryButtons() {
            document.getElementById('undoBtn').disabled = historyIndex <= 0;
            document.getElementById('redoBtn').disabled = historyIndex >= history.length - 1;
        }

        // Elements
        function addTextBox() {
            const box = new TextBox();
            elements.push(box);
            selectedId = box.id;
            updateCanvas();
            updateLayersList();
            saveHistory();
            showStatus('Text box added');
        }

        function add3DText() {
            const text = new Text3D();
            elements.push(text);
            selectedId = text.id;
            updateCanvas();
            updateLayersList();
            saveHistory();
            showStatus('3D Text added');
        }

        function addShape(type) {
            const shape = new Shape(type);
            elements.push(shape);
            updateCanvas();
            updateLayersList();
            saveHistory();
            showStatus(`${type} added`);
        }

        function selectElement(id) {
            selectedId = id;
            const el = elements.find(e => e.id === id);
            
            if (el && el.type === 'text') {
                document.getElementById('textControls').style.display = 'block';
                document.getElementById('text3DControls').style.display = 'none';
                document.getElementById('textContent').value = el.text;
                document.getElementById('textSize').value = el.fontSize;
                document.getElementById('textSizeVal').textContent = el.fontSize + 'px';
                document.getElementById('textColor').value = el.color;
                document.getElementById('textFont').value = el.font;
            } else if (el && el.type === '3d-text') {
                document.getElementById('textControls').style.display = 'none';
                document.getElementById('text3DControls').style.display = 'block';
                document.getElementById('text3DContent').value = el.text;
                document.getElementById('text3DSize').value = el.fontSize;
                document.getElementById('text3DSizeVal').textContent = el.fontSize + 'px';
                document.getElementById('text3DDepth').value = el.depth;
                document.getElementById('text3DDepthVal').textContent = el.depth;
                document.getElementById('text3DColor').value = el.color;
            }
            
            updateLayersList();
            updateCanvas();
        }

        function updateSelectedElement() {
            const el = elements.find(e => e.id === selectedId);
            if (!el) return;

            if (el.type === 'text') {
                el.text = document.getElementById('textContent').value;
                el.fontSize = parseInt(document.getElementById('textSize').value);
                el.color = document.getElementById('textColor').value;
                el.font = document.getElementById('textFont').value;
            } else if (el.type === '3d-text') {
                el.text = document.getElementById('text3DContent').value;
                el.fontSize = parseInt(document.getElementById('text3DSize').value);
                el.color = document.getElementById('text3DColor').value;
                el.depth = parseInt(document.getElementById('text3DDepth').value);
            }

            updateCanvas();
        }

        function cloneElement() {
            const el = elements.find(e => e.id === selectedId);
            if (!el) return;
            const clone = JSON.parse(JSON.stringify(el));
            clone.id = Date.now() + Math.random();
            clone.x += 30;
            clone.y += 30;
            elements.push(clone);
            selectedId = clone.id;
            updateCanvas();
            updateLayersList();
            saveHistory();
            showStatus('Element cloned');
        }

        function deleteElement() {
            elements = elements.filter(e => e.id !== selectedId);
            selectedId = null;
            document.getElementById('textControls').style.display = 'none';
            document.getElementById('text3DControls').style.display = 'none';
            updateCanvas();
            updateLayersList();
            saveHistory();
            showStatus('Element deleted');
        }

        // Image Import
        function openImageImport() {
            document.getElementById('importModal').classList.add('show');
        }

        function importImageFromUrl() {
            const url = document.getElementById('imageUrl').value;
            if (!url) {
                showStatus('Image URL ضروری ہے');
                return;
            }

            const img = new ImageElement(url);
            const image = new Image();
            image.crossOrigin = 'anonymous';
            image.onload = () => {
                img.img = image;
                elements.push(img);
                updateCanvas();
                updateLayersList();
                saveHistory();
                closeModal('importModal');
                showStatus('Image imported');
                document.getElementById('imageUrl').value = '';
            };
            image.onerror = () => {
                showStatus('Image load نہیں ہو سکا');
            };
            image.src = url;
        }

        function importImageFromFile() {
            const file = document.getElementById('importFile').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new ImageElement(e.target.result);
                const image = new Image();
                image.onload = () => {
                    img.img = image;
                    elements.push(img);
                    updateCanvas();
                    updateLayersList();
                    saveHistory();
                    closeModal('importModal');
                    showStatus('Image imported');
                };
                image.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Gallery
        function openGallery() {
            const saved = JSON.parse(localStorage.getItem('gallery') || '[]');
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';

            if (saved.length === 0) {
                grid.innerHTML = '<p style="color: #94a3b8; text-align: center; padding: 20px;">کوئی design نہیں</p>';
            } else {
                saved.forEach((design, idx) => {
                    const item = document.createElement('div');
                    item.style.cssText = 'padding: 10px; background: rgba(59, 130, 246, 0.1); border-radius: 6px; cursor: pointer; font-size: 11px; color: #cbd5e1;';
                    item.innerHTML = `
                        <span>${design.name}</span>
                        <button onclick="deleteGalleryItem(${idx})" style="float: right; background: rgba(239, 68, 68, 0.2); border: none; color: #fca5a5; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-size: 9px;">Delete</button>
                    `;
                    item.onclick = () => {
                        elements = JSON.parse(design.data);
                        updateCanvas();
                        updateLayersList();
                        saveHistory();
                        closeModal('galleryModal');
                        showStatus('Design loaded');
                    };
                    grid.appendChild(item);
                });
            }

            document.getElementById('galleryModal').classList.add('show');
        }

        function deleteGalleryItem(idx) {
            const saved = JSON.parse(localStorage.getItem('gallery') || '[]');
            saved.splice(idx, 1);
            localStorage.setItem('gallery', JSON.stringify(saved));
            openGallery();
        }

        // Platform
        function setPlatform(w, h, name) {
            canvas.width = w;
            canvas.height = h;
            document.getElementById('platformLabel').textContent = name + ' • ' + w + '×' + h;
            updateCanvas();
        }

        // Canvas Drawing
        function updateCanvas() {
            const bgColor = document.getElementById('bgColor').value;
            const br = document.getElementById('brightness').value;
            const co = document.getElementById('contrast').value;
            const sa = document.getElementById('saturation').value;
            const bl = document.getElementById('blur').value;

            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (backgroundImage) {
                ctx.drawImage(backgroundImage, 0, 0, canvas.width, canvas.height);
            }

            ctx.filter = `brightness(${br}%) contrast(${co}%) saturate(${sa}%) blur(${bl}px)`;

            elements.forEach(el => {
                if (el.type === 'text') {
                    ctx.font = `${el.fontSize}px ${el.font}`;
                    ctx.fillStyle = el.color;
                    ctx.textAlign = el.alignment;
                    ctx.textBaseline = 'middle';

                    if (el.id === selectedId) {
                        ctx.strokeStyle = '#3b82f6';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(el.x - el.width/2, el.y - el.height/2, el.width, el.height);
                    }

                    ctx.fillText(el.text, el.x, el.y);

                } else if (el.type === '3d-text') {
                    // 3D Text Effect
                    ctx.font = `bold ${el.fontSize}px Arial`;
                    
                    // Draw shadow/depth
                    for (let i = el.depth; i > 0; i--) {
                        ctx.fillStyle = 'rgba(0, 0, 0, ' + (0.1 * (el.depth - i) / el.depth) + ')';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(el.text, el.x + i, el.y + i);
                    }

                    // Draw front text
                    ctx.fillStyle = el.color;
                    ctx.fillText(el.text, el.x, el.y);

                    if (el.id === selectedId) {
                        ctx.strokeStyle = '#3b82f6';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(el.x - el.width/2, el.y - el.height/2, el.width, el.height);
                    }

                } else if (el.type === 'image' && el.img) {
                    ctx.globalAlpha = el.opacity;
                    ctx.drawImage(el.img, el.x - el.width/2, el.y - el.height/2, el.width, el.height);
                    if (el.id === selectedId) {
                        ctx.strokeStyle = '#3b82f6';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(el.x - el.width/2, el.y - el.height/2, el.width, el.height);
                    }
                    ctx.globalAlpha = 1;

                } else if (['rect', 'circle', 'triangle', 'line'].includes(el.type)) {
                    ctx.globalAlpha = el.opacity;
                    ctx.fillStyle = el.color;

                    if (el.type === 'rect') {
                        ctx.fillRect(el.x - el.width/2, el.y - el.height/2, el.width, el.height);
                    } else if (el.type === 'circle') {
                        ctx.beginPath();
                        ctx.arc(el.x, el.y, el.width/2, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (el.type === 'triangle') {
                        ctx.beginPath();
                        ctx.moveTo(el.x, el.y - el.height/2);
                        ctx.lineTo(el.x + el.width/2, el.y + el.height/2);
                        ctx.lineTo(el.x - el.width/2, el.y + el.height/2);
                        ctx.closePath();
                        ctx.fill();
                    } else if (el.type === 'line') {
                        ctx.lineWidth = 4;
                        ctx.strokeStyle = el.color;
                        ctx.beginPath();
                        ctx.moveTo(el.x - el.width/2, el.y);
                        ctx.lineTo(el.x + el.width/2, el.y);
                        ctx.stroke();
                    }
                    ctx.globalAlpha = 1;
                }
            });

            ctx.filter = 'none';
        }

        function loadBgImage() {
            const file = document.getElementById('bgImage').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        backgroundImage = img;
                        updateCanvas();
                        showStatus('Background loaded');
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // Filters
        function applyFilter(type) {
            if (type === 'bright') document.getElementById('brightness').value = 120;
            else if (type === 'contrast') document.getElementById('contrast').value = 130;
            else if (type === 'sepia') {
                document.getElementById('brightness').value = 110;
                document.getElementById('saturation').value = 80;
            }
            updateValues();
            updateCanvas();
        }

        function updateValues() {
            document.getElementById('brightnessVal').textContent = document.getElementById('brightness').value + '%';
            document.getElementById('contrastVal').textContent = document.getElementById('contrast').value + '%';
            document.getElementById('saturationVal').textContent = document.getElementById('saturation').value + '%';
            document.getElementById('blurVal').textContent = document.getElementById('blur').value + 'px';
        }

        // Layers
        function updateLayersList() {
            const list = document.getElementById('layersList');
            list.innerHTML = '';
            elements.forEach(el => {
                const div = document.createElement('div');
                div.className = `layer-item ${el.id === selectedId ? 'active' : ''}`;
                const icon = el.type === 'text' ? '📝' : el.type === '3d-text' ? '3️⃣' : el.type === 'image' ? '🖼️' : '🔷';
                const name = el.type === 'text' ? `Text: "${el.text.substring(0, 10)}"` : el.type === '3d-text' ? `3D: "${el.text}"` : `${el.type}`;
                div.textContent = `${icon} ${name}`;
                div.onclick = () => selectElement(el.id);
                list.appendChild(div);
            });
        }

        // Export
        function exportDesign() {
            // Check if first free design
            if (!currentUser && !hasCreatedFreeDesign) {
                hasCreatedFreeDesign = true;
                localStorage.setItem('freeDesignCreated', 'true');
            } else if (!currentUser && hasCreatedFreeDesign) {
                openAuth();
                showStatus('Login کریں - دوسری design کے لیے');
                return;
            }

            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = `design-${Date.now()}.png`;
            link.click();

            const saved = JSON.parse(localStorage.getItem('gallery') || '[]');
            saved.push({
                name: `Design ${saved.length + 1}`,
                data: JSON.stringify(elements)
            });
            localStorage.setItem('gallery', JSON.stringify(saved.slice(-10)));
            showStatus('Design exported & saved! ✅');
        }

        // Utilities
        function switchTab(e, tab) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            e.target.classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('show');
        }

        function showStatus(msg) {
            const bar = document.getElementById('statusBar');
            bar.textContent = msg;
            bar.classList.add('show');
            setTimeout(() => bar.classList.remove('show'), 2000);
        }

        // DRAG & DROP
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);

            for (let el of elements) {
                if (x > el.x - el.width/2 && x < el.x + el.width/2 &&
                    y > el.y - el.height/2 && y < el.y + el.height/2) {
                    isDragging = true;
                    dragElement = el;
                    dragOffsetX = x - el.x;
                    dragOffsetY = y - el.y;
                    selectElement(el.id);
                    return;
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && dragElement) {
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX - rect.left) * (canvas.width / rect.width);
                const y = (e.clientY - rect.top) * (canvas.height / rect.height);

                dragElement.x = x - dragOffsetX;
                dragElement.y = y - dragOffsetY;
                updateCanvas();
            }
        });

        canvas.addEventListener('mouseup', () => {
            if (isDragging) {
                saveHistory();
            }
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Color Palette
        function initColors() {
            const palette = document.getElementById('colorPalette');
            colors.forEach(c => {
                const box = document.createElement('button');
                box.style.cssText = `background: ${c}; border-radius: 6px; border: 1px solid rgba(148, 163, 184, 0.25); height: 32px; cursor: pointer;`;
                box.onclick = () => {
                    document.getElementById('bgColor').value = c;
                    updateCanvas();
                };
                palette.appendChild(box);
            });
        }

        // Event Listeners
        document.getElementById('textSize').addEventListener('input', (e) => {
            document.getElementById('textSizeVal').textContent = e.target.value + 'px';
        });

        document.getElementById('text3DSize').addEventListener('input', (e) => {
            document.getElementById('text3DSizeVal').textContent = e.target.value + 'px';
        });

        document.getElementById('text3DDepth').addEventListener('input', (e) => {
            document.getElementById('text3DDepthVal').textContent = e.target.value;
        });

        document.getElementById('brightness').addEventListener('input', updateValues);
        document.getElementById('contrast').addEventListener('input', updateValues);
        document.getElementById('saturation').addEventListener('input', updateValues);
        document.getElementById('blur').addEventListener('input', updateValues);

        // Initialize
        checkUserStatus();
        initColors();
        elements.push(new TextBox());
        saveHistory();
        updateCanvas();
        updateLayersList();
        updateHistoryButtons();
    </script>
</body>
</html>
